version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
      - IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION:-manual-$(date +%Y%m%d%H%M%S)}
      - export FRONTEND_IMAGE_URI="$ECR_REPOSITORY_URI:$IMAGE_TAG"

  build:
    commands:
      - echo Build started on `date`
      - cd ui-fe
      - docker build -t "$FRONTEND_IMAGE_URI" .

  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing Docker image $FRONTEND_IMAGE_URI
      - docker push "$FRONTEND_IMAGE_URI"
      - cd ..
      - bash scripts/deploy_app_stack.sh

artifacts:
  files:
    - '**/*'
