AWSTemplateFormatVersion: '2010-09-09'
Description: 'CI/CD Infrastructure for Lightship AI Project - CodeCommit and CodeBuild'

Parameters:
  ProjectName:
    Type: String
    Default: lightship
    Description: Name of the project for resource naming
    
  Environment:
    Type: String
    Default: mvp
    AllowedValues: [mvp, dev, staging, production]
    Description: Environment name

  AppStackName:
    Type: String
    Default: lightship-mvp-app
    Description: Name of the Application CloudFormation stack

  VPCStackName:
    Type: String
    Default: lightship-mvp-vpc
    Description: Name of the VPC CloudFormation stack

  CodeCommitRepoName:
    Type: String
    Default: lightship-ai-mvp
    Description: Name of the existing CodeCommit repository (not managed by this stack)

Resources:
  # S3 Bucket for CodeBuild Artifacts
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-${Environment}-cicd-artifacts-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldArtifacts
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-cicd-artifacts'
        - Key: Environment
          Value: !Ref Environment

  # IAM Role for CodeBuild - Frontend
  FrontendCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-codebuild-frontend-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser
      Policies:
        - PolicyName: CodeBuildBasePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-${Environment}-frontend'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-${Environment}-frontend:*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub '${ArtifactsBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - codecommit:GitPull
                Resource:
                  - !Sub 'arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:${CodeCommitRepoName}'
        - PolicyName: CloudFormationDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListChangeSets
                  - cloudformation:ValidateTemplate
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt AppCloudFormationDeploymentRole.Arn
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-codebuild-frontend-role'
        - Key: Environment
          Value: !Ref Environment

  # IAM Role for CodeBuild - Backend
  BackendCodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-codebuild-backend-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser
      Policies:
        - PolicyName: CodeBuildBasePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-${Environment}-backend'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}-${Environment}-backend:*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub '${ArtifactsBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - codecommit:GitPull
                Resource:
                  - !Sub 'arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:${CodeCommitRepoName}'
        - PolicyName: CloudFormationDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListChangeSets
                  - cloudformation:ValidateTemplate
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt AppCloudFormationDeploymentRole.Arn
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-codebuild-backend-role'
        - Key: Environment
          Value: !Ref Environment

  AppCloudFormationDeploymentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-cfn-app-deploy-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AppStackImageDeploy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:RegisterTaskDefinition
                  - ecs:TagResource
                  - ecs:UntagResource
                  - ecs:UpdateService
                Resource: '*'
              - Effect: Allow
                Action:
                  - application-autoscaling:DeleteScalingPolicy
                  - application-autoscaling:DeregisterScalableTarget
                  - application-autoscaling:DescribeScalingPolicies
                  - application-autoscaling:DescribeScalableTargets
                  - application-autoscaling:PutScalingPolicy
                  - application-autoscaling:RegisterScalableTarget
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:AddPermission
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:GetPolicy
                  - lambda:ListTags
                  - lambda:RemovePermission
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-${Environment}-backend'
              - Effect: Allow
                Action:
                  - elasticloadbalancing:DeregisterTargets
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:DescribeRules
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:RegisterTargets
                Resource: '*'
              - Effect: Allow
                Action:
                  - events:DeleteRule
                  - events:DescribeRule
                  - events:ListTargetsByRule
                  - events:PutRule
                  - events:PutTargets
                  - events:RemoveTargets
                Resource: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/${ProjectName}-${Environment}-lambda-warmup'
              - Effect: Allow
                Action:
                  - states:CreateStateMachine
                  - states:DeleteStateMachine
                  - states:DescribeStateMachine
                  - states:TagResource
                  - states:UntagResource
                  - states:UpdateStateMachine
                Resource: !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${ProjectName}-${Environment}-pipeline'
              - Effect: Allow
                Action:
                  - logs:CreateLogDelivery
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:DeleteLogDelivery
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:DescribeResourcePolicies
                  - logs:GetLogDelivery
                  - logs:ListLogDeliveries
                  - logs:PutLogEvents
                  - logs:PutResourcePolicy
                  - logs:PutRetentionPolicy
                  - logs:UpdateLogDelivery
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - Fn::ImportValue: !Sub '${ProjectName}-${Environment}-ecs-execution-role-arn'
                  - Fn::ImportValue: !Sub '${ProjectName}-${Environment}-ecs-task-role-arn'
                  - Fn::ImportValue: !Sub '${ProjectName}-${Environment}-lambda-role-arn'
                  - Fn::ImportValue: !Sub '${ProjectName}-${Environment}-sfn-execution-role-arn'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-cfn-app-deploy-role'
        - Key: Environment
          Value: !Ref Environment

  FrontendCodeBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${ProjectName}-${Environment}-frontend'
      RetentionInDays: 30

  BackendCodeBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/codebuild/${ProjectName}-${Environment}-backend'
      RetentionInDays: 30

  # CodeBuild Project - Frontend
  FrontendCodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-frontend'
      Description: Build and deploy Lightship frontend to ECS
      ServiceRole: !GetAtt FrontendCodeBuildRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: APP_STACK_NAME
            Value: !Ref AppStackName
          - Name: VPC_STACK_NAME
            Value: !Ref VPCStackName
          - Name: APP_TEMPLATE_FILE
            Value: infrastructure/app-stack.yaml
          - Name: CLOUDFORMATION_TEMPLATE_BUCKET
            Value: !Ref ArtifactsBucket
          - Name: CLOUDFORMATION_DEPLOY_ROLE_ARN
            Value: !GetAtt AppCloudFormationDeploymentRole.Arn
          - Name: ECR_REPOSITORY_URI
            Value:
              Fn::ImportValue: !Sub '${ProjectName}-${Environment}-frontend-ecr-uri'
      Source:
        Type: CODECOMMIT
        Location: !Sub 'https://git-codecommit.${AWS::Region}.amazonaws.com/v1/repos/${CodeCommitRepoName}'
        BuildSpec: ui-fe/buildspec.yml
      LogsConfig:
        CloudWatchLogs:
          GroupName: !Ref FrontendCodeBuildLogGroup
          Status: ENABLED
      TimeoutInMinutes: 30
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-frontend-build'
        - Key: Environment
          Value: !Ref Environment

  # CodeBuild Project - Backend
  BackendCodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-backend'
      Description: Build and deploy Lightship backend Lambda
      ServiceRole: !GetAtt BackendCodeBuildRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: APP_STACK_NAME
            Value: !Ref AppStackName
          - Name: VPC_STACK_NAME
            Value: !Ref VPCStackName
          - Name: APP_TEMPLATE_FILE
            Value: infrastructure/app-stack.yaml
          - Name: CLOUDFORMATION_TEMPLATE_BUCKET
            Value: !Ref ArtifactsBucket
          - Name: CLOUDFORMATION_DEPLOY_ROLE_ARN
            Value: !GetAtt AppCloudFormationDeploymentRole.Arn
          - Name: ECR_REPOSITORY_URI
            Value:
              Fn::ImportValue: !Sub '${ProjectName}-${Environment}-backend-ecr-uri'
      Source:
        Type: CODECOMMIT
        Location: !Sub 'https://git-codecommit.${AWS::Region}.amazonaws.com/v1/repos/${CodeCommitRepoName}'
        BuildSpec: lambda-be/buildspec.yml
      LogsConfig:
        CloudWatchLogs:
          GroupName: !Ref BackendCodeBuildLogGroup
          Status: ENABLED
      TimeoutInMinutes: 30
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-backend-build'
        - Key: Environment
          Value: !Ref Environment

Outputs:
  CodeCommitRepositoryName:
    Description: CodeCommit Repository Name
    Value: !Ref CodeCommitRepoName
    Export:
      Name: !Sub '${ProjectName}-${Environment}-codecommit-repo'

  CodeCommitRepositoryCloneUrlHttp:
    Description: CodeCommit Repository Clone URL (HTTP)
    Value: !Sub 'https://git-codecommit.${AWS::Region}.amazonaws.com/v1/repos/${CodeCommitRepoName}'
    Export:
      Name: !Sub '${ProjectName}-${Environment}-codecommit-clone-url'

  FrontendCodeBuildProjectName:
    Description: Frontend CodeBuild Project Name
    Value: !Ref FrontendCodeBuildProject
    Export:
      Name: !Sub '${ProjectName}-${Environment}-frontend-codebuild'

  BackendCodeBuildProjectName:
    Description: Backend CodeBuild Project Name
    Value: !Ref BackendCodeBuildProject
    Export:
      Name: !Sub '${ProjectName}-${Environment}-backend-codebuild'

  ArtifactsBucketName:
    Description: S3 Bucket for Build Artifacts
    Value: !Ref ArtifactsBucket
    Export:
      Name: !Sub '${ProjectName}-${Environment}-artifacts-bucket'

  AppCloudFormationDeploymentRoleArn:
    Description: CloudFormation deployment role used by CodeBuild
    Value: !GetAtt AppCloudFormationDeploymentRole.Arn
