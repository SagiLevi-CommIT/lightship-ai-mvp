name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend pytest (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install backend + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest boto3 pydantic fastapi python-multipart mangum python-dotenv httpx uvicorn

      - name: Run offline test suite
        env:
          AWS_DEFAULT_REGION: us-east-1
          # Force text logging locally so stdout isn't JSON-wrapped; makes
          # failures easier to read in CI output.
          LOG_FORMAT: text
        run: |
          python -m pytest \
            tests/test_07_config_generator.py \
            tests/test_08_progress_tracking.py \
            tests/test_api_contracts.py \
            tests/test_batch_endpoints.py \
            tests/test_dispatcher_and_sqs.py \
            tests/test_metrics_and_logging.py \
            -v

  frontend-build:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui-fe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui-fe/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE: ''
        run: npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: next-standalone
          path: |
            ui-fe/.next
            ui-fe/public
          if-no-files-found: warn
          retention-days: 1

  frontend-e2e:
    name: Playwright e2e
    needs: frontend-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui-fe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui-fe/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build UI (for next start)
        env:
          NEXT_PUBLIC_API_BASE: ''
        run: npm run build

      - name: Run Playwright
        env:
          CI: 'true'
          NEXT_PUBLIC_API_BASE: ''
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui-fe/playwright-report
          retention-days: 7
