AWSTemplateFormatVersion: '2010-09-09'
Description: 'Backend Lambda Function for Lightship AI MVP with ALB Integration'

Parameters:
  ProjectName:
    Type: String
    Default: lightship
  Environment:
    Type: String
    Default: mvp
    AllowedValues: [mvp, dev, staging, production]
  ImageUri:
    Type: String
    Description: ECR image URI for the Lambda function
    Default: 336090301206.dkr.ecr.us-east-1.amazonaws.com/lightship-backend:latest

Resources:
  BackendLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-${Environment}-backend'
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Role:
        Fn::ImportValue: !Sub '${ProjectName}-${Environment}-lambda-role-arn'
      MemorySize: 3008
      Timeout: 900
      VpcConfig:
        SubnetIds:
          - Fn::ImportValue: !Sub '${ProjectName}-${Environment}-private-app-subnet-1'
          - Fn::ImportValue: !Sub '${ProjectName}-${Environment}-private-app-subnet-2'
        SecurityGroupIds:
          - Fn::ImportValue: !Sub '${ProjectName}-${Environment}-lambda-sg-id'
      Environment:
        Variables:
          AWS_REGION_NAME: us-east-1
          ENVIRONMENT: !Ref Environment
          LOG_LEVEL: INFO
          BEDROCK_MODEL_ID: us.anthropic.claude-sonnet-4-20250514-v1:0
          TEMPERATURE: '0.1'
          MAX_TOKENS: '15000'
          TOP_P: '1.0'
          TOP_K: '250'
          REKOGNITION_MIN_CONFIDENCE: '60.0'
          REKOGNITION_MAX_LABELS: '50'
          DYNAMODB_TABLE:
            Fn::ImportValue: !Sub '${ProjectName}-${Environment}-jobs-table'
          PROCESSING_BUCKET:
            Fn::ImportValue: !Sub '${ProjectName}-${Environment}-processing-bucket'
          RESULTS_BUCKET:
            Fn::ImportValue: !Sub '${ProjectName}-${Environment}-processing-bucket'
          RESULTS_PREFIX: results
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-backend'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
        - Key: Created-by
          Value: cloudformation

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BackendLambdaFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com

Outputs:
  LambdaFunctionArn:
    Description: Backend Lambda Function ARN
    Value: !GetAtt BackendLambdaFunction.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-backend-lambda-arn'
  LambdaFunctionName:
    Description: Backend Lambda Function Name
    Value: !Ref BackendLambdaFunction
    Export:
      Name: !Sub '${ProjectName}-${Environment}-backend-lambda-name'
